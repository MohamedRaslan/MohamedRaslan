<svg width="960" height="320" viewBox="0 0 960 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mohamed Raslan terminal intro</title>
  <desc id="desc">Terminal-style card with console typing animation describing Mohamed Raslan's quality engineering focus.</desc>
  <style>
    .window { fill: #0d1117; stroke: #30363d; stroke-width: 2; }
    .bar { fill: #161b22; }
    .dot-red { fill: #ff5f56; }
    .dot-yellow { fill: #ffbd2e; }
    .dot-green { fill: #27c93f; }
    .prompt { fill: #58a6ff; font: 600 18px Consolas, Monaco, monospace; }
    .text { fill: #e6edf3; font: 18px Consolas, Monaco, monospace; }
    .smallText { fill: #e6edf3; font: 14px Consolas, Monaco, monospace; }
    .areaAccent { fill: #3fb950; font: 600 18px Consolas, Monaco, monospace; }
    .muted { fill: #8b949e; font: 16px Consolas, Monaco, monospace; }
    .accent { fill: #3fb950; font: 600 18px Consolas, Monaco, monospace; }
    .cursor { fill: #e6edf3; animation: blink 1s steps(1) infinite; }
    .line2, .line3, .line4, .line5 { opacity: 0; animation: appear 0.01s linear forwards; }
    .line2 { animation-delay: 1.7s; }
    .line3 { animation-delay: 3.9s; }
    .line4 { animation-delay: 5.8s; }
    .line5 { animation-delay: 8.3s; }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes appear { to { opacity: 1; } }
  </style>
  <defs>
    <clipPath id="type1">
      <rect x="58" y="60" width="0" height="28">
        <animate attributeName="width" from="0" to="74" dur="1.1s" begin="0.2s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type2">
      <rect x="58" y="94" width="0" height="28">
        <animate attributeName="width" from="0" to="610" dur="1.8s" begin="1.8s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type3">
      <rect x="58" y="132" width="0" height="28">
        <animate attributeName="width" from="0" to="640" dur="1.8s" begin="4s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type4">
      <rect x="58" y="162" width="0" height="28">
        <animate attributeName="width" from="0" to="790" dur="2s" begin="6.2s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type5">
      <rect x="58" y="200" width="0" height="28">
        <animate attributeName="width" from="0" to="142" dur="1.2s" begin="9.1s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type6">
      <rect x="58" y="234" width="0" height="28">
        <animate attributeName="width" from="0" to="690" dur="2s" begin="10.8s" fill="freeze" />
      </rect>
    </clipPath>
    <clipPath id="type7">
      <rect x="58" y="272" width="0" height="28">
        <animate attributeName="width" from="0" to="340" dur="1.5s" begin="13.4s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <rect x="1" y="1" width="958" height="318" rx="14" class="window"/>
  <rect x="1" y="1" width="958" height="42" rx="14" class="bar"/>
  <circle cx="30" cy="22" r="7" class="dot-red"/>
  <circle cx="54" cy="22" r="7" class="dot-yellow"/>
  <circle cx="78" cy="22" r="7" class="dot-green"/>
  <text x="110" y="28" class="muted">mohamed-raslan --whoami</text>

  <g class="line1">
    <text x="30" y="78" class="prompt">$</text>
    <text x="58" y="78" class="text" clip-path="url(#type1)">whoami</text>
  </g>
  <g class="line2">
    <text x="58" y="112" class="accent" clip-path="url(#type2)">Mohamed Raslan</text>
    <text x="218" y="112" class="text" clip-path="url(#type2)">- Software Test Automation Engineer</text>
  </g>
  <g class="line3">
    <text x="58" y="150" class="smallText" clip-path="url(#type3)">focused on reliable software, practical DevOps,</text>
  </g>
  <g class="line4">
    <text x="58" y="180" class="smallText" clip-path="url(#type4)">test automation, and tools that make quality easier to measure, improve, and trust.</text>
  </g>
  <g class="line5">
    <text x="30" y="218" class="prompt">$</text>
    <text x="58" y="218" class="text" clip-path="url(#type5)">focus --areas</text>
  </g>
  <g class="line5">
    <text x="58" y="252" class="areaAccent" clip-path="url(#type6)">automation</text>
    <text x="160" y="252" class="text" clip-path="url(#type6)"> | </text>
    <text x="190" y="252" class="areaAccent" clip-path="url(#type6)">quality tooling</text>
    <text x="350" y="252" class="text" clip-path="url(#type6)"> | </text>
    <text x="380" y="252" class="areaAccent" clip-path="url(#type6)">CI/CD</text>
    <text x="438" y="252" class="text" clip-path="url(#type6)"> | </text>
    <text x="468" y="252" class="areaAccent" clip-path="url(#type6)">test strategy</text>
    <text x="610" y="252" class="text" clip-path="url(#type6)"> | learning labs</text>
  </g>
  <g class="line5">
    <text x="30" y="290" class="prompt">$</text>
    <text x="58" y="290" class="text" clip-path="url(#type7)">ship confidence, not just code</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.05;.95;1" begin="0.2s" dur="1.15s" fill="freeze"/>
    <rect x="58" y="61" width="11" height="22" class="cursor">
      <animate attributeName="x" from="58" to="132" begin="0.2s" dur="1.1s" fill="freeze"/>
    </rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.03;.97;1" begin="1.8s" dur="1.85s" fill="freeze"/>
    <rect x="58" y="95" width="11" height="22" class="cursor">
      <animate attributeName="x" from="58" to="668" begin="1.8s" dur="1.8s" fill="freeze"/>
    </rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.04;.96;1" begin="4s" dur="1.25s" fill="freeze"/>
    <rect x="58" y="133" width="11" height="22" class="cursor">
      <animate attributeName="x" from="58" to="698" begin="4s" dur="1.8s" fill="freeze"/>
    </rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.03;.97;1" begin="6.2s" dur="2.05s" fill="freeze"/>
    <rect x="58" y="163" width="11" height="22" class="cursor">
      <animate attributeName="x" from="58" to="848" begin="6.2s" dur="2s" fill="freeze"/>
    </rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.04;.96;1" begin="9.1s" dur="1.25s" fill="freeze"/>
    <rect x="58" y="201" width="11" height="22" class="cursor">
      <animate attributeName="x" from="58" to="200" begin="9.1s" dur="1.2s" fill="freeze"/>
    </rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;.03;.97;1" begin="10.8s" dur="2.05s" fill="freeze"/>
    <rect x="58" y="235" width="11" height="22" class="cursor">
      <animate attributeName="x" from="58" to="748" begin="10.8s" dur="2s" fill="freeze"/>
    </rect>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1" keyTimes="0;.05;1" begin="13.4s" dur="1.55s" fill="freeze"/>
    <rect x="58" y="273" width="11" height="22" class="cursor">
      <animate attributeName="x" from="58" to="398" begin="13.4s" dur="1.5s" fill="freeze"/>
    </rect>
  </g>
</svg>
