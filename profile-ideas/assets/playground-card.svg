<svg width="960" height="220" viewBox="0 0 960 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">QA playground card</title>
  <desc id="desc">A card linking to an interactive QA playground.</desc>
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; }
    .title { fill: #e6edf3; font: 800 32px Segoe UI, Arial, sans-serif; }
    .accent { fill: #58a6ff; }
    .body { fill: #c9d1d9; font: 18px Segoe UI, Arial, sans-serif; }
    .box { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .pass { fill: #3fb950; }
    .fail { fill: #f85149; animation: blink 1.4s steps(1) infinite; }
    @keyframes blink { 50% { opacity: .25; } }
  </style>
  <rect x="1" y="1" width="958" height="218" rx="14" class="bg"/>
  <text x="42" y="68" class="title">Open the <tspan class="accent">QA Playground</tspan></text>
  <text x="42" y="106" class="body">Run sample checks, inspect fake bugs, and see how automation reports explain risk.</text>
  <text x="42" y="148" fill="#79c0ff" font-family="Consolas, monospace" font-size="18">click -> test -> report -> improve</text>
  <rect x="680" y="42" width="216" height="132" rx="10" class="box"/>
  <circle cx="714" cy="78" r="8" class="pass"/>
  <circle cx="714" cy="112" r="8" class="pass"/>
  <circle cx="714" cy="146" r="8" class="fail"/>
  <text x="738" y="84" fill="#e6edf3" font-family="Consolas, monospace" font-size="16">login.spec</text>
  <text x="738" y="118" fill="#e6edf3" font-family="Consolas, monospace" font-size="16">api.spec</text>
  <text x="738" y="152" fill="#e6edf3" font-family="Consolas, monospace" font-size="16">checkout.spec</text>
</svg>
