<svg width="960" height="260" viewBox="0 0 960 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">QA challenge card</title>
  <desc id="desc">A terminal-style QA challenge showing a weak assertion and a corrected assertion.</desc>
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; }
    .bar { fill: #161b22; }
    .title { fill: #58a6ff; font: 700 22px Consolas, monospace; }
    .code { fill: #e6edf3; font: 17px Consolas, monospace; }
    .bad { fill: #f85149; font: 17px Consolas, monospace; }
    .good { fill: #3fb950; font: 17px Consolas, monospace; }
    .hint { fill: #8b949e; font: 15px Consolas, monospace; }
    .cursor { fill: #e6edf3; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
  <rect x="1" y="1" width="958" height="258" rx="14" class="bg"/>
  <rect x="1" y="1" width="958" height="42" rx="14" class="bar"/>
  <circle cx="30" cy="22" r="7" fill="#ff5f56"/>
  <circle cx="54" cy="22" r="7" fill="#ffbd2e"/>
  <circle cx="78" cy="22" r="7" fill="#27c93f"/>
  <text x="110" y="28" class="hint">qa-challenge.spec.ts</text>
  <text x="42" y="78" class="title">Can you spot the weak test?</text>
  <text x="42" y="116" class="code">await page.click("[data-testid=checkout]")</text>
  <text x="42" y="148" class="bad">expect(response.status()).toBeLessThan(500)</text>
  <text x="42" y="190" class="good">expect(response.status()).toBe(200)</text>
  <text x="42" y="222" class="good">expect(await order.isVisible()).toBeTruthy()</text>
  <rect x="475" y="205" width="11" height="22" class="cursor"/>
  <text x="610" y="146" class="hint">weak: lets many failures pass</text>
  <text x="610" y="206" class="hint">better: asserts behavior users care about</text>
</svg>
