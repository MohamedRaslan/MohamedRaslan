<svg width="960" height="220" viewBox="0 0 960 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">QA Quest mini game preview</title>
  <desc id="desc">A dark card inviting visitors to play a bug finding QA quest.</desc>
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; }
    .title { fill: #58a6ff; font: 700 34px Segoe UI, Arial, sans-serif; }
    .body { fill: #e6edf3; font: 18px Segoe UI, Arial, sans-serif; }
    .muted { fill: #8b949e; font: 15px Consolas, monospace; }
    .btn { fill: #238636; }
    .btnText { fill: #ffffff; font: 700 16px Segoe UI, Arial, sans-serif; }
    .bug { fill: #f85149; animation: pulse 1.7s ease-in-out infinite; transform-origin: center; }
    .tile { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    @keyframes pulse { 50% { opacity: .45; transform: scale(.92); } }
  </style>
  <rect x="1" y="1" width="958" height="218" rx="14" class="bg"/>
  <text x="42" y="62" class="title">QA Quest: find the hidden bug</text>
  <text x="42" y="98" class="body">A tiny profile game idea: visitors inspect a scenario, pick the risky behavior, and open the testing playground.</text>
  <rect x="42" y="130" width="176" height="42" rx="8" class="btn"/>
  <text x="72" y="157" class="btnText">Start Quest</text>
  <text x="42" y="195" class="muted">README friendly: use this as an image that links to GitHub Pages.</text>
  <rect x="680" y="42" width="54" height="54" rx="8" class="tile"/>
  <rect x="744" y="42" width="54" height="54" rx="8" class="tile"/>
  <rect x="808" y="42" width="54" height="54" rx="8" class="tile"/>
  <rect x="680" y="106" width="54" height="54" rx="8" class="tile"/>
  <rect x="744" y="106" width="54" height="54" rx="8" class="tile"/>
  <rect x="808" y="106" width="54" height="54" rx="8" class="tile"/>
  <circle cx="835" cy="133" r="16" class="bug"/>
  <text x="826" y="139" fill="#fff" font-family="Consolas, monospace" font-size="20">!</text>
</svg>
